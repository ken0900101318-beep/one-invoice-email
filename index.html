<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊 - 電子發票 Email 登記</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .filter-section {
            margin-bottom: 20px;
        }
        
        .filter-section label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .filter-section select {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-section select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .search-box {
            margin-bottom: 25px;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .store-list {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 25px;
        }
        
        .store-item {
            padding: 18px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .store-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(3px);
        }
        
        .store-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
        }
        
        .store-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }
        
        .store-address {
            color: #666;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .store-info {
            color: #999;
            font-size: 12px;
        }
        
        .form-section {
            display: none;
            padding: 25px;
            background: #f8f9ff;
            border-radius: 12px;
            margin-bottom: 18px;
        }
        
        .form-section.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            font-size: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group .readonly {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .success-message {
            display: none;
            padding: 18px;
            background: #d4edda;
            border: 2px solid #c3e6cb;
            border-radius: 10px;
            color: #155724;
            text-align: center;
            font-size: 16px;
            margin-top: 18px;
        }
        
        .success-message.show {
            display: block;
        }
        
        .error-message {
            display: none;
            padding: 18px;
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            border-radius: 10px;
            color: #721c24;
            text-align: center;
            font-size: 16px;
            margin-top: 18px;
        }
        
        .error-message.show {
            display: block;
        }
        
        .no-results {
            text-align: center;
            color: #999;
            padding: 35px;
            display: none;
        }
        
        .no-results.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/ken0900101318-beep/one-management-portal/main/one-logo.jpg" alt="ONE桌遊">
        </div>
        <h1>🎮 ONE桌遊</h1>
        <p class="subtitle">電子發票 Email 登記系統</p>
        
        <div class="loading" id="loading">載入中...</div>
        
        <div id="mainContent" style="display:none;">
            <div class="filter-section">
                <label>📍 選擇縣市</label>
                <select id="cityFilter">
                    <option value="">全部縣市</option>
                </select>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 請輸入您的店名搜尋...">
            </div>
            
            <div class="store-list" id="storeList"></div>
            <div class="no-results" id="noResults">找不到店家，請確認店名是否正確</div>
            
            <div class="form-section" id="formSection">
                <div class="form-group">
                    <label>店名</label>
                    <input type="text" id="storeName" class="readonly" readonly>
                </div>
                <div class="form-group">
                    <label>地址</label>
                    <input type="text" id="storeAddress" class="readonly" readonly>
                </div>
                <div class="form-group">
                    <label>統一編號</label>
                    <input type="text" id="storeTaxId" class="readonly" readonly>
                </div>
                <div class="form-group">
                    <label>📧 Email（請填寫接收電子發票的信箱） *</label>
                    <input type="email" id="emailInput" placeholder="例: your@email.com" required>
                </div>
                <button class="btn btn-primary" id="submitBtn">✅ 送出 Email</button>
            </div>
            
            <div class="success-message" id="successMessage">
                ✅ Email 已成功登記！感謝您的配合
            </div>
            
            <div class="error-message" id="errorMessage">
                ❌ 送出失敗，請稍後再試
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzbXRLuBumfB_h6Aprq_tmspfti7KCvcBLmCZAsoFLei_VJuruWcsrevX_6lfNBvaJY_Q/exec';
        
        let stores = [];
        let selectedStore = null;
        let cities = new Set();

        // 提取縣市
        function extractCity(address) {
            if (!address) return '';
            const match = address.match(/^(台北市|新北市|桃園市|台中市|台南市|高雄市|基隆市|新竹市|嘉義市|新竹縣|苗栗縣|彰化縣|南投縣|雲林縣|嘉義縣|屏東縣|宜蘭縣|花蓮縣|台東縣|澎湖縣|金門縣|連江縣)/);
            return match ? match[1] : '';
        }

        // 載入店家資料
        async function loadStores() {
            try {
                const response = await fetch(GAS_URL + '?action=getStores');
                stores = await response.json();
                
                // 提取所有縣市
                stores.forEach(store => {
                    const city = extractCity(store['地址'] || store.address || '');
                    if (city) cities.add(city);
                });
                
                // 建立縣市選單
                const cityFilter = document.getElementById('cityFilter');
                Array.from(cities).sort().forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    cityFilter.appendChild(option);
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                displayStores(stores);
            } catch (error) {
                console.error('載入資料失敗:', error);
                document.getElementById('loading').textContent = '載入失敗，請重新整理頁面';
            }
        }

        // 顯示店家列表
        function displayStores(storesToShow) {
            const storeList = document.getElementById('storeList');
            const noResults = document.getElementById('noResults');
            
            if (storesToShow.length === 0) {
                storeList.innerHTML = '';
                noResults.classList.add('show');
                return;
            }
            
            noResults.classList.remove('show');
            storeList.innerHTML = storesToShow.map(store => {
                const name = store['店名'] || store.name || '未命名';
                const address = store['地址'] || store.address || '';
                const taxId = store['統編_二聯式填無_'] || store.tax_id || '無';
                const monthlyFee = store['月費'] || store.monthly_fee || 0;
                
                return `
                    <div class="store-item" data-id="${store.id}">
                        <div class="store-name">${name}</div>
                        <div class="store-address">📍 ${address}</div>
                        <div class="store-info">統編: ${taxId} | 月費: $${monthlyFee.toLocaleString()}</div>
                    </div>
                `;
            }).join('');
            
            // 綁定點擊事件
            document.querySelectorAll('.store-item').forEach(item => {
                item.addEventListener('click', () => selectStore(parseInt(item.dataset.id)));
            });
        }

        // 篩選功能
        function filterStores() {
            const cityFilter = document.getElementById('cityFilter').value;
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filtered = stores;
            
            // 縣市篩選
            if (cityFilter) {
                filtered = filtered.filter(store => {
                    const address = store['地址'] || store.address || '';
                    return extractCity(address) === cityFilter;
                });
            }
            
            // 關鍵字搜尋
            if (searchKeyword) {
                filtered = filtered.filter(store => {
                    const name = (store['店名'] || store.name || '').toLowerCase();
                    const address = (store['地址'] || store.address || '').toLowerCase();
                    return name.includes(searchKeyword) || address.includes(searchKeyword);
                });
            }
            
            displayStores(filtered);
        }

        // 監聽篩選
        document.getElementById('cityFilter').addEventListener('change', filterStores);
        document.getElementById('searchInput').addEventListener('input', filterStores);

        // 選擇店家
        function selectStore(storeId) {
            selectedStore = stores.find(s => s.id == storeId);
            if (!selectedStore) return;
            
            // 更新選中狀態
            document.querySelectorAll('.store-item').forEach(item => {
                item.classList.remove('selected');
                if (parseInt(item.dataset.id) === storeId) {
                    item.classList.add('selected');
                }
            });
            
            // 填入表單
            document.getElementById('storeName').value = selectedStore['店名'] || selectedStore.name || '';
            document.getElementById('storeAddress').value = selectedStore['地址'] || selectedStore.address || '';
            document.getElementById('storeTaxId').value = selectedStore['統編_二聯式填無_'] || selectedStore.tax_id || '無';
            document.getElementById('emailInput').value = selectedStore.email || '';
            
            // 顯示表單
            document.getElementById('formSection').classList.add('active');
            document.getElementById('formSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 送出表單
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            
            if (!email) {
                alert('請填寫 Email');
                return;
            }
            
            if (!validateEmail(email)) {
                alert('Email 格式不正確');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            btn.disabled = true;
            btn.textContent = '送出中...';
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 重要！避免 CORS 問題
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        store_id: selectedStore.id,
                        email: email
                    })
                });
                
                // no-cors 模式無法讀取 response，假設成功
                successMsg.classList.add('show');
                document.getElementById('formSection').classList.remove('active');
                
                setTimeout(() => {
                    successMsg.classList.remove('show');
                    document.getElementById('searchInput').value = '';
                    document.getElementById('cityFilter').value = '';
                    loadStores(); // 重新載入
                }, 3000);
                
            } catch (error) {
                console.error('送出失敗:', error);
                errorMsg.textContent = '❌ 送出失敗: ' + error.message;
                errorMsg.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ 送出 Email';
            }
        });

        // Email 驗證
        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // 初始化
        loadStores();
    </script>
</body>
</html>
