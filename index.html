<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊 - 電子發票 Email 登記</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .search-box {
            margin-bottom: 25px;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .store-list {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 25px;
        }
        
        .store-item {
            padding: 18px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .store-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(3px);
        }
        
        .store-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
        }
        
        .store-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }
        
        .store-address {
            color: #666;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .store-info {
            color: #999;
            font-size: 12px;
        }
        
        .form-section {
            display: none;
            padding: 25px;
            background: #f8f9ff;
            border-radius: 12px;
            margin-bottom: 18px;
        }
        
        .form-section.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            font-size: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group .readonly {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .success-message {
            display: none;
            padding: 18px;
            background: #d4edda;
            border: 2px solid #c3e6cb;
            border-radius: 10px;
            color: #155724;
            text-align: center;
            font-size: 16px;
            margin-top: 18px;
        }
        
        .success-message.show {
            display: block;
        }
        
        .no-results {
            text-align: center;
            color: #999;
            padding: 35px;
            display: none;
        }
        
        .no-results.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://ken0900101318-beep.github.io/one-management-portal/one-logo.jpg" alt="ONE桌遊">
        </div>
        <h1>🎮 ONE桌遊</h1>
        <p class="subtitle">電子發票 Email 登記系統</p>
        
        <div class="loading" id="loading">載入中...</div>
        
        <div id="mainContent" style="display:none;">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 請輸入您的店名搜尋...">
            </div>
            
            <div class="store-list" id="storeList"></div>
            <div class="no-results" id="noResults">找不到店家，請確認店名是否正確</div>
            
            <div class="form-section" id="formSection">
                <div class="form-group">
                    <label>店名</label>
                    <input type="text" id="storeName" class="readonly" readonly>
                </div>
                <div class="form-group">
                    <label>地址</label>
                    <input type="text" id="storeAddress" class="readonly" readonly>
                </div>
                <div class="form-group">
                    <label>統一編號</label>
                    <input type="text" id="storeTaxId" class="readonly" readonly>
                </div>
                <div class="form-group">
                    <label>📧 Email（請填寫接收電子發票的信箱） *</label>
                    <input type="email" id="emailInput" placeholder="例: your@email.com" required>
                </div>
                <button class="btn btn-primary" id="submitBtn">✅ 送出 Email</button>
            </div>
            
            <div class="success-message" id="successMessage">
                ✅ Email 已成功登記！感謝您的配合
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 請替換成你的 Google Apps Script 網址
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzbXRLuBumfB_h6Aprq_tmspfti7KCvcBLmCZAsoFLei_VJuruWcsrevX_6lfNBvaJY_Q/exec';
        
        let stores = [];
        let selectedStore = null;

        // 載入店家資料
        async function loadStores() {
            try {
                const response = await fetch(GAS_URL + '?action=getStores');
                stores = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                displayStores(stores);
            } catch (error) {
                console.error('載入資料失敗:', error);
                document.getElementById('loading').textContent = '載入失敗，請重新整理頁面';
            }
        }

        // 顯示店家列表
        function displayStores(storesToShow) {
            const storeList = document.getElementById('storeList');
            const noResults = document.getElementById('noResults');
            
            if (storesToShow.length === 0) {
                storeList.innerHTML = '';
                noResults.classList.add('show');
                return;
            }
            
            noResults.classList.remove('show');
            storeList.innerHTML = storesToShow.map(store => `
                <div class="store-item" data-id="${store.id}">
                    <div class="store-name">${store['店名'] || store.name || '未命名'}</div>
                    <div class="store-address">📍 ${store['地址'] || store.address || ''}</div>
                    <div class="store-info">統編: ${store['統編_二聯式填無_'] || store.tax_id || '無'} | 月費: $${(store['月費'] || store.monthly_fee || 0).toLocaleString()}</div>
                </div>
            `).join('');
            
            // 綁定點擊事件
            document.querySelectorAll('.store-item').forEach(item => {
                item.addEventListener('click', () => selectStore(parseInt(item.dataset.id)));
            });
        }

        // 搜尋功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            if (keyword === '') {
                displayStores(stores);
            } else {
                const filtered = stores.filter(store => {
                    const name = (store['店名'] || store.name || '').toLowerCase();
                    const address = (store['地址'] || store.address || '').toLowerCase();
                    return name.includes(keyword) || address.includes(keyword);
                });
                displayStores(filtered);
            }
        });

        // 選擇店家
        function selectStore(storeId) {
            selectedStore = stores.find(s => s.id == storeId);
            if (!selectedStore) return;
            
            // 更新選中狀態
            document.querySelectorAll('.store-item').forEach(item => {
                item.classList.remove('selected');
                if (parseInt(item.dataset.id) === storeId) {
                    item.classList.add('selected');
                }
            });
            
            // 填入表單
            document.getElementById('storeName').value = selectedStore['店名'] || selectedStore.name || '';
            document.getElementById('storeAddress').value = selectedStore['地址'] || selectedStore.address || '';
            document.getElementById('storeTaxId').value = selectedStore['統編_二聯式填無_'] || selectedStore.tax_id || '無';
            document.getElementById('emailInput').value = selectedStore.email || '';
            
            // 顯示表單
            document.getElementById('formSection').classList.add('active');
            document.getElementById('formSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 送出表單
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            
            if (!email) {
                alert('請填寫 Email');
                return;
            }
            
            if (!validateEmail(email)) {
                alert('Email 格式不正確');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '送出中...';
            
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        store_id: selectedStore.id,
                        email: email
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('successMessage').classList.add('show');
                    document.getElementById('formSection').classList.remove('active');
                    setTimeout(() => {
                        document.getElementById('successMessage').classList.remove('show');
                        document.getElementById('searchInput').value = '';
                        loadStores(); // 重新載入
                    }, 3000);
                } else {
                    alert('送出失敗: ' + (result.error || '未知錯誤'));
                }
            } catch (error) {
                console.error('送出失敗:', error);
                alert('送出失敗，請稍後再試');
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ 送出 Email';
            }
        });

        // Email 驗證
        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // 初始化
        loadStores();
    </script>
</body>
</html>
